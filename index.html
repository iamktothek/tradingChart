<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading OS Pro | v3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0f1a; color: #cbd5e1; -webkit-tap-highlight-color: transparent; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .price-up { color: #4ade80 !important; }
        .price-down { color: #f87171 !important; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-3 lg:p-8">
    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-black text-white tracking-tighter uppercase">Trading<span class="text-blue-500">OS</span> <span class="text-[10px] text-slate-500 font-normal">v3.0</span></h1>
                <p id="last-sync" class="text-[9px] font-bold text-slate-600 uppercase tracking-widest">System Live</p>
            </div>
            <div class="flex items-center justify-between w-full sm:w-auto gap-4 bg-slate-900/80 p-3 px-6 rounded-2xl border border-white/5 shadow-xl">
                <div class="text-left sm:text-right">
                    <p class="text-[10px] uppercase text-slate-500 font-black">Net Equity</p>
                    <p id="live-equity" class="text-xl font-mono text-white font-bold">$0.00</p>
                </div>
                <button onclick="initDashboard()" class="bg-blue-600 hover:bg-blue-500 active:scale-95 p-3 rounded-xl transition-all shadow-lg">
                    <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-2 lg:grid-cols-6 gap-3 mb-6">
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                <p class="text-slate-500 text-[9px] font-black uppercase mb-1">BTC / USD</p>
                <div class="flex items-center gap-2">
                    <p id="btc-price" class="text-lg font-mono font-bold text-orange-500">----</p>
                    <span id="btc-trend" class="text-xs"></span>
                </div>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                <p class="text-slate-500 text-[9px] font-black uppercase mb-1">Win Rate</p>
                <p id="win-rate" class="text-lg font-mono font-bold text-white">0%</p>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                <p class="text-slate-500 text-[9px] font-black uppercase mb-1">Trades</p>
                <p id="trade-count" class="text-lg font-mono font-bold text-blue-400">0</p>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                <p class="text-slate-500 text-[9px] font-black uppercase mb-1">Daily P&L</p>
                <p id="daily-pnl" class="text-lg font-mono font-bold text-white">$0.00</p>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                <p class="text-slate-500 text-[9px] font-black uppercase mb-1">Total P&L</p>
                <div id="total-pnl" class="leading-tight font-mono">--</div>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                <p class="text-slate-500 text-[9px] font-black uppercase mb-1">Confidence</p>
                <p id="node-confidence" class="text-lg font-mono font-bold text-emerald-500">84%</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-7 space-y-6">
                <div class="glass p-4 rounded-3xl grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex items-center gap-3 p-3 bg-white/5 rounded-2xl">
                        <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                        <div>
                            <p class="text-[10px] font-black text-slate-500 uppercase">NODE_SENTIMENT_01</p>
                            <p class="text-xs text-white">Sentiment: Bullish Bias</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 p-3 bg-white/5 rounded-2xl">
                        <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                        <div>
                            <p class="text-[10px] font-black text-slate-500 uppercase">NODE_VOLATILITY_04</p>
                            <p class="text-xs text-white">ATR: Normal Range</p>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-900/50 p-4 sm:p-6 rounded-3xl border border-white/5 shadow-2xl">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-[10px] font-black text-slate-500 uppercase">Growth Performance</h3>
                        <div class="flex gap-1 bg-slate-950/50 p-1 rounded-lg border border-white/5">
                            <button onclick="updateChartFilter('24h')" id="btn-24h" class="text-[9px] px-2 py-1 rounded-md text-slate-400 hover:text-white uppercase font-bold transition-all">24h</button>
                            <button onclick="updateChartFilter('7d')" id="btn-7d" class="text-[9px] px-2 py-1 rounded-md text-slate-400 hover:text-white uppercase font-bold transition-all">7d</button>
                            <button onclick="updateChartFilter('30d')" id="btn-30d" class="text-[9px] px-2 py-1 rounded-md text-slate-400 hover:text-white uppercase font-bold transition-all">30d</button>
                            <button onclick="updateChartFilter('all')" id="btn-all" class="text-[9px] px-2 py-1 rounded-md bg-blue-600 text-white uppercase font-bold transition-all">All</button>
                        </div>
                    </div>
                    <div class="h-[300px] lg:h-[400px]"><canvas id="performanceChart"></canvas></div>
                </div>
                <div class="bg-slate-900/50 rounded-3xl border border-white/5 overflow-hidden h-[400px] shadow-2xl">
                    <div id="tv-chart" class="h-full"></div>
                </div>
            </div>

            <div class="lg:col-span-5 bg-slate-900/50 rounded-3xl border border-white/5 flex flex-col overflow-hidden shadow-2xl">
                <div class="p-4 border-b border-white/5 bg-slate-900/80 flex justify-between items-center">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase">Execution Feed</h3>
                    <span class="text-[9px] text-emerald-500 font-mono">LIVE_WORKER_FEED</span>
                </div>
                <div class="overflow-y-auto custom-scrollbar h-[600px] lg:h-[1050px]">
                    <div id="trade-feed" class="divide-y divide-white/5"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const PROXY_URL = "https://tradingproxy.iamkevinkelly.workers.dev"; 
        const STARTING_BALANCE = 100000;
        
        let chartInstance = null;
        let lastBtcPrice = 0;
        let rawPoints = []; 
        let currentFilter = 'all';

        async function updateBTCPrice() {
            try {
                const res = await fetch('https://api.coinbase.com/v2/prices/BTC-USD/spot');
                const data = await res.json();
                const price = parseFloat(data.data.amount);
                const btcEl = document.getElementById('btc-price');
                const trendEl = document.getElementById('btc-trend');
                
                if (price > 0) {
                    btcEl.innerText = `$${price.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    if (lastBtcPrice > 0 && price !== lastBtcPrice) {
                        const isUp = price > lastBtcPrice;
                        btcEl.classList.remove('text-orange-500');
                        btcEl.classList.add(isUp ? 'price-up' : 'price-down');
                        trendEl.innerHTML = isUp ? '▲' : '▼';
                        trendEl.className = `text-xs ${isUp ? 'text-green-500' : 'text-red-500'}`;
                        setTimeout(() => { 
                            btcEl.classList.remove('price-up', 'price-down');
                            btcEl.classList.add('text-orange-500');
                        }, 1000);
                    }
                    lastBtcPrice = price;
                }
            } catch (e) { console.error("Ticker Fail"); }
        }

        async function initDashboard() {
            const icon = document.getElementById('refresh-icon'); icon.classList.add('animate-spin');
            try {
                const response = await fetch(PROXY_URL);
                const data = await response.json();
                const today = new Date().toDateString();
                
                document.getElementById('live-equity').innerText = `$${parseFloat(data.account.equity).toLocaleString()}`;

                // Process Sheet CSV Data
                const rows = data.sheetData.split('\n').slice(1).filter(r => r.trim() !== "" && r.includes(','));
                const sortedRows = rows.sort((a, b) => new Date(a.split(',')[1]) - new Date(b.split(',')[1]));
                
                const feedContainer = document.getElementById('trade-feed'); feedContainer.innerHTML = '';
                
                // Reset baseline
                rawPoints = [{ x: new Date("2026-03-10T00:00:00").getTime(), y: 0 }];
                let winCount = 0, closedCount = 0, runningEquity = 0, totalPnlSum = 0, dailyPnlSum = 0;

                sortedRows.forEach((row) => {
                    const cols = row.split(',');
                    const dateObj = new Date(cols[1]); 
                    const symbol = cols[2], tp = cols[4], sl = cols[5], status = cols[7]?.trim().toUpperCase() || "";
                    const pnlVal = parseFloat(cols[9]) || 0, outcome = cols[10]?.trim() || "";

                    if (status === "CLOSED") {
                        closedCount++;
                        totalPnlSum += pnlVal;
                        runningEquity += pnlVal;
                        rawPoints.push({ x: dateObj.getTime(), y: runningEquity });
                        if (dateObj.toDateString() === today) dailyPnlSum += pnlVal;
                        if (outcome.toLowerCase() === "win" || pnlVal > 0) winCount++;
                    }

                    const isOpen = status === "OPEN";
                    const item = document.createElement('div');
                    item.className = `p-4 flex flex-col gap-2 ${isOpen ? 'bg-blue-500/10 border-l-4 border-l-blue-500' : ''}`;
                    item.innerHTML = `
                        <div class="flex justify-between items-center text-[10px] font-mono text-slate-500">
                            <span>${dateObj.toLocaleString()}</span>
                            <span class="px-2 py-0.5 rounded font-black uppercase ${isOpen ? 'bg-blue-500 text-white animate-pulse' : 'bg-slate-800 text-slate-400'}">${status}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <div>
                                <h4 class="text-sm font-black text-blue-400 leading-none mb-1">${symbol}</h4>
                                <div class="flex gap-2 text-[9px] font-mono"><span class="text-green-500">TP: ${tp}</span><span class="text-red-500">SL: ${sl}</span></div>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-mono font-bold ${pnlVal >= 0 ? 'text-green-400' : 'text-red-400'}">
                                    ${isOpen ? 'LIVE' : (pnlVal > 0 ? '+' : '') + pnlVal.toFixed(2)}
                                </p>
                            </div>
                        </div>
                    `;
                    feedContainer.prepend(item);
                });

                // Stats Updates
                const totalRoi = (totalPnlSum / STARTING_BALANCE) * 100;
                document.getElementById('daily-pnl').innerText = (dailyPnlSum >= 0 ? '+' : '') + `$${dailyPnlSum.toFixed(2)}`;
                document.getElementById('total-pnl').innerHTML = `
                    <span class="block text-lg font-bold">${totalPnlSum >= 0 ? '+' : ''}$${totalPnlSum.toLocaleString()}</span>
                    <span class="text-[11px] font-bold opacity-90">${totalPnlSum >= 0 ? '+' : ''}${totalRoi.toFixed(2)}%</span>
                `;
                document.getElementById('total-pnl').className = `font-mono ${totalPnlSum >= 0 ? 'text-green-400' : 'text-red-400'}`;
                document.getElementById('trade-count').innerText = closedCount;
                document.getElementById('win-rate').innerText = `${closedCount > 0 ? Math.round((winCount/closedCount)*100) : 0}%`;
                document.getElementById('last-sync').innerText = `Sync: ${new Date().toLocaleTimeString()}`;

                applyChartData();
            } catch (err) { console.error("Sync Failed", err); } finally { icon.classList.remove('animate-spin'); }
        }

        // --- CHART LOGIC ---
        function updateChartFilter(range) {
            currentFilter = range;
            ['24h', '7d', '30d', 'all'].forEach(id => {
                const b = document.getElementById(`btn-${id}`);
                b.classList.remove('bg-blue-600', 'text-white'); b.classList.add('text-slate-400');
            });
            document.getElementById(`btn-${range}`).classList.add('bg-blue-600', 'text-white');
            applyChartData();
        }

        function applyChartData() {
            let filtered = rawPoints;
            const now = Date.now();
            if (currentFilter !== 'all') {
                const lookback = { '24h': 86400000, '7d': 604800000, '30d': 2592000000 };
                filtered = rawPoints.filter(p => p.x >= (now - lookback[currentFilter]));
            }
            renderChart(filtered);
        }

        function renderChart(data) {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        data: data,
                        borderColor: '#3b82f6',
                        borderWidth: 2,
                        tension: 0.15,
                        fill: true,
                        backgroundColor: 'rgba(59,130,246,0.05)',
                        pointRadius: data.length > 40 ? 0 : 3,
                        pointBackgroundColor: '#3b82f6'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { type: 'time', time: { unit: 'day', displayFormats: { day: 'MMM d' } }, grid: { display: false }, ticks: { color: '#64748b', font: { size: 9 }, maxTicksLimit: 7 } },
                        y: { grid: { color: (c) => c.tick.value === 0 ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.05)', lineWidth: (c) => c.tick.value === 0 ? 2 : 1 }, ticks: { color: '#64748b', font: { size: 10 } } }
                    }
                }
            });
        }

        function initTV() { 
            new TradingView.widget({ "autosize": true, "symbol": "COINBASE:BTCUSD", "interval": "60", "theme": "dark", "style": "1", "container_id": "tv-chart", "hide_top_toolbar": true, "allow_symbol_change": true }); 
        }

        // Initialize
        initDashboard(); initTV(); updateBTCPrice();
        setInterval(initDashboard, 60000); 
        setInterval(updateBTCPrice, 5000); 
    </script>
</body>
</html>
