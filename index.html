<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading OS Pro | Master Terminal v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0f1a; color: #cbd5e1; -webkit-tap-highlight-color: transparent; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .price-up { color: #4ade80 !important; }
        .price-down { color: #f87171 !important; }
        .active-filter { background-color: #2563eb !important; color: white !important; }
    </style>
</head>
<body class="p-3 lg:p-8">
    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-black text-white tracking-tighter uppercase italic">Trading<span class="text-blue-500">OS</span> <span class="text-[10px] bg-blue-600 text-white px-2 py-0.5 rounded ml-2 uppercase font-bold tracking-widest">PRO v2.1</span></h1>
                <p id="last-sync" class="text-[9px] font-bold text-slate-600 uppercase tracking-widest mt-1 italic font-mono">Sync: --:--:--</p>
            </div>
            <div class="flex items-center gap-4 bg-slate-900/80 p-3 px-6 rounded-2xl border border-white/5 shadow-xl">
                <div class="text-right">
                    <p class="text-[10px] uppercase text-slate-500 font-black tracking-widest">Net Equity</p>
                    <p id="live-equity" class="text-xl font-mono text-white font-bold">$0.00</p>
                </div>
                <button onclick="initDashboard()" class="bg-blue-600 hover:bg-blue-500 active:scale-95 p-3 rounded-xl transition-all shadow-lg">
                    <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-2 lg:grid-cols-6 gap-3 mb-6">
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                <p class="text-slate-500 text-[9px] font-black uppercase mb-1">BTC / USD</p>
                <div class="flex items-center gap-2">
                    <p id="btc-price" class="text-lg font-mono font-bold text-orange-500 transition-colors duration-500">----</p>
                    <span id="btc-trend" class="text-[10px] font-bold"></span>
                </div>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                <p class="text-slate-500 text-[9px] font-black uppercase mb-1">Win Rate</p>
                <p id="win-rate" class="text-lg font-mono font-bold text-white">0%</p>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                <p class="text-slate-500 text-[9px] font-black uppercase mb-1">Trades</p>
                <p id="trade-count" class="text-lg font-mono font-bold text-blue-400">0</p>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                <p class="text-slate-500 text-[9px] font-black uppercase mb-1">Daily P&L</p>
                <p id="daily-pnl" class="text-lg font-mono font-bold">$0.00</p>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                <p class="text-slate-500 text-[9px] font-black uppercase mb-1">Total P&L</p>
                <div id="total-pnl" class="leading-tight font-mono font-bold">--</div>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5 col-span-2 lg:col-span-1">
                <p class="text-slate-500 text-[9px] font-black uppercase mb-1">Buying Power</p>
                <p id="buying-power" class="text-lg font-mono font-bold text-slate-400">--</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-6">
            <div class="lg:col-span-8 space-y-6">
                <div class="bg-slate-900/50 p-6 rounded-3xl border border-white/5 shadow-2xl">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                        <div>
                            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Performance Curve</h3>
                            <p class="text-[9px] text-slate-600 font-bold uppercase mt-1 italic">Baseline: Mar 10</p>
                        </div>
                        <div class="flex gap-1 bg-black/20 p-1 rounded-xl">
                            <button onclick="applyFilter('24h', this)" class="filter-btn text-[9px] font-black uppercase px-3 py-1.5 rounded-lg text-slate-500 transition-all">24H</button>
                            <button onclick="applyFilter('7d', this)" class="filter-btn text-[9px] font-black uppercase px-3 py-1.5 rounded-lg text-slate-500 transition-all">7D</button>
                            <button onclick="applyFilter('all', this)" class="filter-btn active-filter text-[9px] font-black uppercase px-3 py-1.5 rounded-lg bg-blue-600 text-white transition-all">All</button>
                        </div>
                    </div>
                    <div class="h-[350px]"><canvas id="performanceChart"></canvas></div>
                </div>
                <div class="bg-slate-900/50 rounded-3xl border border-white/5 overflow-hidden h-[450px]">
                    <div id="tv-chart" class="h-full"></div>
                </div>
            </div>

            <div class="lg:col-span-4 bg-slate-900/50 rounded-3xl border border-white/5 flex flex-col overflow-hidden shadow-2xl">
                <div class="p-4 border-b border-white/5 bg-slate-900/80 flex justify-between items-center">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Execution Details</h3>
                    <span class="text-[8px] bg-blue-500/10 text-blue-400 px-2 py-1 rounded font-bold uppercase">Live Logs</span>
                </div>
                <div class="overflow-y-auto custom-scrollbar h-[800px] lg:h-[880px]">
                    <div id="trade-feed" class="divide-y divide-white/5"></div>
                </div>
            </div>
        </div>

        <div class="bg-slate-900/50 p-6 rounded-3xl border border-white/5 shadow-2xl mb-12">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Decision Analysis Feed</h3>
            <div id="decision-feed" class="flex flex-col gap-8 max-h-[1200px] overflow-y-auto pr-4 custom-scrollbar"></div>
        </div>
    </div>

    <script>
        const PROXY_URL = "https://tradingproxy.iamkevinkelly.workers.dev"; 
        const STARTING_BALANCE = 100000;
        let chartInstance = null;
        let lastBtcPrice = 0;
        let allTrades = [];

        // Robust CSV Parser for handling commas in rationales
        function parseCSVLine(line) {
            const result = []; let current = ''; let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                else current += char;
            }
            result.push(current.trim());
            return result.map(v => v.replace(/^"|"$/g, ''));
        }

        async function updateBTCPrice() {
            try {
                const res = await fetch('https://api.coinbase.com/v2/prices/BTC-USD/spot');
                const data = await res.json();
                const price = parseFloat(data.data.amount);
                const btcEl = document.getElementById('btc-price');
                const trendEl = document.getElementById('btc-trend');

                if (price > 0) {
                    if (lastBtcPrice > 0 && price !== lastBtcPrice) {
                        const isUp = price > lastBtcPrice;
                        btcEl.className = `text-lg font-mono font-bold transition-colors duration-500 ${isUp ? 'price-up' : 'price-down'}`;
                        trendEl.innerText = isUp ? '▲' : '▼';
                        trendEl.className = `text-[10px] font-bold ${isUp ? 'text-green-400' : 'text-red-400'}`;
                        setTimeout(() => { btcEl.className = 'text-lg font-mono font-bold text-orange-500 transition-colors duration-500'; }, 2000);
                    }
                    btcEl.innerText = `$${price.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    lastBtcPrice = price;
                }
            } catch (e) {}
        }

        async function initDashboard() {
            const icon = document.getElementById('refresh-icon'); icon.classList.add('animate-spin');
            try {
                const response = await fetch(PROXY_URL);
                const data = await response.json();
                const today = new Date().toDateString();
                
                document.getElementById('live-equity').innerText = `$${parseFloat(data.account.equity).toLocaleString()}`;
                document.getElementById('buying-power').innerText = `$${parseFloat(data.account.buying_power).toLocaleString()}`;

                const rows = data.sheetData.split('\n').slice(1).filter(r => r.trim() !== "");
                const feedContainer = document.getElementById('trade-feed'); feedContainer.innerHTML = '';
                
                let winCount = 0, closedCount = 0, runningPnl = 0, dailyPnlSum = 0;
                allTrades = [];

                rows.forEach((row) => {
                    const cols = parseCSVLine(row);
                    if (cols.length < 11) return;
                    const dateObj = new Date(cols[1]); 
                    const status = cols[7]?.toUpperCase() || "";
                    const pnlVal = parseFloat(cols[9]) || 0;

                    if (status === "CLOSED") {
                        closedCount++;
                        if (dateObj.toDateString() === today) dailyPnlSum += pnlVal;
                        if (cols[10]?.toLowerCase() === "win" || pnlVal > 0) winCount++;
                    }

                    runningPnl += pnlVal;
                    allTrades.push({ 
                        rawTime: cols[1], 
                        timestamp: dateObj.getTime(),
                        pnl: pnlVal,
                        symbol: cols[2],
                        cumulativePnl: runningPnl,
                        status: status,
                        dateLabel: dateObj.toLocaleDateString('en-US', {month:'short', day:'numeric'})
                    });

                    const isOpen = status === "OPEN";
                    const item = document.createElement('div');
                    item.className = `p-4 flex flex-col gap-2 ${isOpen ? 'bg-blue-500/10 border-l-4 border-l-blue-500' : ''}`;
                    item.innerHTML = `
                        <div class="flex justify-between items-center text-[10px] font-mono text-slate-500">
                            <span>${dateObj.toLocaleString()}</span>
                            <span class="px-2 py-0.5 rounded font-black uppercase ${isOpen ? 'bg-blue-500 text-white animate-pulse' : 'bg-slate-800 text-slate-400'}">${status}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <div><h4 class="text-sm font-black text-blue-400 mb-0.5">${cols[2]}</h4>
                                 <div class="flex gap-2 text-[9px] font-mono"><span class="text-green-500 font-bold uppercase">TP: ${cols[4]}</span><span class="text-red-500 font-bold uppercase">SL: ${cols[5]}</span></div>
                            </div>
                            <div class="text-right font-mono font-bold ${pnlVal >= 0 ? 'text-green-400' : 'text-red-400'}">${isOpen ? 'LIVE' : (pnlVal > 0 ? '+' : '') + pnlVal.toFixed(2)}</div>
                        </div>`;
                    feedContainer.prepend(item);
                });

                // Stats Color Triggers
                const dailyEl = document.getElementById('daily-pnl');
                dailyEl.innerText = (dailyPnlSum >= 0 ? '+' : '') + `$${dailyPnlSum.toFixed(2)}`;
                dailyEl.className = `text-lg font-mono font-bold ${dailyPnlSum >= 0 ? 'text-green-400' : 'text-red-400'}`;

                const totalPnlEl = document.getElementById('total-pnl');
                totalPnlEl.innerHTML = `<span class="block text-lg font-bold">${runningPnl >= 0 ? '+' : ''}$${runningPnl.toLocaleString(undefined, {minimumFractionDigits: 2})}</span><span class="text-[11px] opacity-90">${((runningPnl/STARTING_BALANCE)*100).toFixed(2)}%</span>`;
                totalPnlEl.className = `font-mono ${runningPnl >= 0 ? 'text-green-400' : 'text-red-400'}`;

                document.getElementById('trade-count').innerText = closedCount;
                document.getElementById('win-rate').innerText = `${closedCount > 0 ? Math.round((winCount / closedCount) * 100) : 0}%`;

                if (data.decisionsData) renderDecisionFeed(data.decisionsData);
                applyFilter('all', document.querySelector('.active-filter'));
                document.getElementById('last-sync').innerText = `Sync: ${new Date().toLocaleTimeString()}`;

            } catch (err) { console.error(err); } finally { icon.classList.remove('animate-spin'); }
        }

        function renderDecisionFeed(csvString) {
            const feed = document.getElementById('decision-feed');
            const rows = csvString.split('\n').slice(1).filter(r => r.trim() !== "");
            feed.innerHTML = '';

            rows.forEach(row => {
                const cols = parseCSVLine(row);
                if (cols.length < 9) return;
                const analysisTime = new Date(cols[0]).getTime();
                const isExecuted = cols[1].toUpperCase() === 'TRUE';

                // Link to Execution Logic (120s window)
                const linkedTrade = allTrades.find(t => {
                    const diff = (t.timestamp - analysisTime) / 1000;
                    return diff >= 0 && diff <= 120;
                });

                let linkedBadge = "";
                if (linkedTrade) {
                    let badgeStyle, pnlText;
                    if (linkedTrade.status === "OPEN" || isNaN(linkedTrade.pnl)) {
                        badgeStyle = "bg-blue-600/20 text-blue-400 border-blue-500/40"; pnlText = "Active";
                    } else if (linkedTrade.pnl > 0) {
                        badgeStyle = "bg-green-600/20 text-green-400 border-green-500/40"; pnlText = `+$${linkedTrade.pnl.toFixed(2)}`;
                    } else {
                        badgeStyle = "bg-red-600/20 text-red-400 border-red-500/40"; pnlText = `$${linkedTrade.pnl.toFixed(2)}`;
                    }
                    linkedBadge = `<div class="flex items-center gap-2 px-3 py-1.5 rounded-lg border font-black text-[9px] uppercase tracking-wider ${badgeStyle}">${linkedTrade.symbol} | ${pnlText}</div>`;
                }

                const card = document.createElement('div');
                card.className = "bg-black/40 border border-white/5 rounded-3xl p-6 flex flex-col gap-6 shadow-xl w-full";
                card.innerHTML = `
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 pb-4 border-b border-white/5">
                        <div class="flex flex-col"><span class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Workflow Timestamp</span><span class="text-sm font-bold text-white font-mono">${new Date(cols[0]).toLocaleString()}</span></div>
                        <div class="flex items-center gap-3">${linkedBadge}<div class="px-4 py-2 rounded-xl border font-black text-[10px] uppercase ${isExecuted ? 'bg-green-500/20 text-green-400 border-green-500/30' : 'bg-red-500/20 text-red-400 border-red-500/30'}">${isExecuted ? "Trade Executed" : "No Trade"}</div></div>
                    </div>
                    <div class="bg-blue-500/5 border border-blue-500/20 rounded-2xl p-5"><span class="text-[9px] font-black text-blue-400 uppercase tracking-widest block mb-2">Trading Rationale</span><p class="text-xs text-slate-200 font-medium leading-relaxed">${cols[2]}</p></div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div class="bg-white/[0.03] border border-white/5 rounded-2xl p-5"><span class="text-[9px] font-black text-blue-400 uppercase tracking-widest block mb-4">Short Term Analysis</span><div class="flex justify-between items-center bg-white/5 p-3 rounded-lg mb-4"><span class="text-[10px] font-bold text-white uppercase">${cols[3]}</span><span class="bg-blue-600 text-white px-2 py-1 rounded text-[10px] font-black">${cols[4]}%</span></div><p class="text-[11px] text-slate-400 italic">"${cols[5]}"</p></div>
                        <div class="bg-white/[0.03] border border-white/5 rounded-2xl p-5"><span class="text-[9px] font-black text-purple-400 uppercase tracking-widest block mb-4">Long Term Analysis</span><div class="flex justify-between items-center bg-white/5 p-3 rounded-lg mb-4"><span class="text-[10px] font-bold text-white uppercase">${cols[6]}</span><span class="bg-purple-600 text-white px-2 py-1 rounded text-[10px] font-black">${cols[7]}%</span></div><p class="text-[11px] text-slate-400 italic">"${cols[8]}"</p></div>
                    </div>`;
                feed.prepend(card);
            });
        }

        function applyFilter(range, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter', 'bg-blue-600', 'text-white'));
            btn.classList.add('active-filter', 'bg-blue-600', 'text-white');
            const now = Date.now();
            let filtered = allTrades.filter(t => {
                if (range === '24h') return (now - t.timestamp) <= (24 * 60 * 60 * 1000);
                if (range === '7d') return (now - t.timestamp) <= (7 * 24 * 60 * 60 * 1000);
                return true;
            }).sort((a,b) => a.timestamp - b.timestamp);
            renderChart(filtered.map(t => t.dateLabel), filtered.map(t => t.cumulativePnl));
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            
            const minVal = Math.min(...data, 0); const maxVal = Math.max(...data, 0);
            const range = maxVal - minVal;

            const gradient = ctx.createLinearGradient(0, 0, 0, 350);
            if (range > 0) {
                const zeroPos = maxVal / range;
                gradient.addColorStop(0, '#4ade80'); gradient.addColorStop(Math.max(0, zeroPos - 0.05), '#4ade80');
                gradient.addColorStop(Math.min(1, zeroPos + 0.05), '#f87171'); gradient.addColorStop(1, '#f87171');
            } else { gradient.addColorStop(0, (data[0] || 0) >= 0 ? '#4ade80' : '#f87171'); }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ data, borderColor: gradient, borderWidth: 3, tension: 0.4, fill: { target: 'origin', above: 'rgba(74, 222, 128, 0.05)', below: 'rgba(248, 113, 113, 0.05)' }, pointRadius: 0 }] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: true, grid: { display: false }, ticks: { color: '#334155', font: { size: 9 }, maxTicksLimit: 12 } },
                        y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#64748b', font: { size: 10 }, callback: v => (v >= 0 ? '+' : '') + '$' + v.toLocaleString() } }
                    }
                }
            });
        }

        function initTV() { new TradingView.widget({ "autosize": true, "symbol": "COINBASE:BTCUSD", "interval": "60", "theme": "dark", "style": "1", "container_id": "tv-chart", "hide_top_toolbar": true, "backgroundColor": "#0b0f1a" }); }
        
        // BOOTSTRAP
        initDashboard(); initTV(); updateBTCPrice();
        setInterval(updateBTCPrice, 5000); // 5s Price Update
        setInterval(initDashboard, 60000); // 1m Full Sync
    </script>
</body>
</html>
