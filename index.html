<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading OS Pro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0f1a; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        @keyframes pulse-blue { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-slow { animation: pulse-blue 2s infinite; }
    </style>
</head>
<body class="text-slate-300 min-h-screen">

    <div class="max-w-[1600px] mx-auto p-4 lg:p-6">
        
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-6">
            <div>
                <h1 class="text-2xl font-black text-white tracking-tighter uppercase">Trading<span class="text-blue-500">OS</span></h1>
                <p class="text-slate-500 text-[10px] font-bold tracking-widest uppercase opacity-60">Multi-Source Analytics // Live</p>
            </div>

            <div class="flex items-center gap-4 bg-slate-900/80 p-2 pl-6 rounded-2xl border border-white/5">
                <div class="text-right mr-4">
                    <p class="text-[10px] uppercase tracking-widest text-slate-500 font-black">Net Account Equity</p>
                    <p id="live-equity" class="text-2xl font-mono text-white font-bold tracking-tight">$0.00</p>
                </div>
                <button onclick="initDashboard()" id="refresh-btn" class="bg-blue-600 hover:bg-blue-500 p-4 rounded-xl transition-all shadow-lg shadow-blue-600/20">
                    <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-4 mb-8">
            <div class="bg-slate-900/50 p-5 rounded-2xl border border-white/5">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">BTC / USD Price</p>
                <p id="btc-price" class="text-2xl font-mono font-bold text-orange-500 transition-colors duration-500">----</p>
            </div>

            <div class="bg-slate-900/50 p-5 rounded-2xl border border-white/5">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">Win Rate</p>
                <div class="flex items-center gap-3">
                    <p id="win-rate" class="text-2xl font-mono font-bold text-white">0%</p>
                    <div class="flex-1 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                        <div id="win-rate-bar" class="h-full bg-blue-500 transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900/50 p-5 rounded-2xl border border-white/5">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">Trade Count</p>
                <p id="trade-count" class="text-2xl font-mono font-bold text-blue-400">0</p>
            </div>

            <div class="bg-slate-900/50 p-5 rounded-2xl border border-white/5">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">Session P&L</p>
                <p id="daily-pnl" class="text-2xl font-mono font-bold text-white">--</p>
            </div>

            <div class="bg-slate-900/50 p-5 rounded-2xl border border-white/5">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">Buying Power</p>
                <p id="buying-power" class="text-2xl font-mono font-bold text-slate-400">--</p>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
            <div class="xl:col-span-8 space-y-6">
                <div class="bg-slate-900/50 p-6 rounded-3xl border border-white/5">
                    <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Equity Growth (CSV Data)</h3>
                    <div class="h-[400px]"><canvas id="performanceChart"></canvas></div>
                </div>
                <div class="bg-slate-900/50 rounded-3xl border border-white/5 overflow-hidden h-[450px]">
                    <div id="tv-chart" class="h-full"></div>
                </div>
            </div>

            <div class="xl:col-span-4 bg-slate-900/50 rounded-3xl border border-white/5 flex flex-col overflow-hidden">
                <div class="p-5 border-b border-white/5 flex justify-between items-center">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">Executions</h3>
                    <span id="last-sync" class="text-[9px] font-bold text-slate-600 uppercase">Syncing...</span>
                </div>
                <div class="overflow-y-auto custom-scrollbar h-[900px]">
                    <table class="w-full text-left">
                        <tbody id="trade-feed"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PROXY_URL = "https://trading-api-proxy.yourname.workers.dev"; // UPDATE THIS
        let chartInstance = null;
        let lastBtcPrice = 0;

        async function updateBTCPrice() {
            try {
                const res = await fetch(PROXY_URL);
                const data = await res.json();
                const btcRaw = data.btc?.trades?.["BTC/USD"]?.p || data.btc?.trade?.p || 0;
                const btcEl = document.getElementById('btc-price');
                
                if (btcRaw > 0) {
                    btcEl.innerText = `$${parseFloat(btcRaw).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    btcEl.style.color = btcRaw >= lastBtcPrice ? '#4ade80' : '#f87171';
                    lastBtcPrice = btcRaw;
                    setTimeout(() => { btcEl.style.color = '#f59e0b'; }, 1000);
                }
            } catch (e) { console.error("BTC Sync Error"); }
        }

        async function initDashboard() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('animate-spin');
            
            try {
                const response = await fetch(PROXY_URL);
                const data = await response.json();

                document.getElementById('live-equity').innerText = `$${parseFloat(data.account.equity).toLocaleString()}`;
                document.getElementById('buying-power').innerText = `$${parseFloat(data.account.buying_power).toLocaleString()}`;
                
                const pnl = data.account.equity - data.account.last_equity;
                const pnlEl = document.getElementById('daily-pnl');
                pnlEl.innerText = (pnl >= 0 ? '+' : '') + `$${pnl.toFixed(2)}`;
                pnlEl.className = `text-2xl font-mono font-bold ${pnl >= 0 ? 'text-green-400' : 'text-red-400'}`;

                const rows = data.sheetData.split('\n').slice(1).filter(r => r.trim() !== "");
                const feedContainer = document.getElementById('trade-feed');
                feedContainer.innerHTML = '';

                let winCount = 0;
                let closedTrades = 0;
                let runningEquity = 0;
                let labels = [];
                let points = [];

                rows.forEach((row) => {
                    const cols = row.split(',');
                    const time = cols[1]; const symbol = cols[2]; 
                    const status = cols[7]?.trim().toUpperCase() || "CLOSED";
                    const pnlVal = parseFloat(cols[9]) || 0;
                    const outcome = cols[10] || "";

                    if (status === "CLOSED") {
                        closedTrades++;
                        if (pnlVal > 0 || outcome.toLowerCase().includes("win")) winCount++;
                    }

                    runningEquity += pnlVal;
                    labels.push(time);
                    points.push(runningEquity);

                    const isOpen = status === "OPEN";
                    const tr = document.createElement('tr');
                    tr.className = `border-b border-white/5 ${isOpen ? 'bg-blue-500/10 border-l-4 border-l-blue-500' : ''}`;
                    tr.innerHTML = `
                        <td class="p-4 text-xs font-bold text-white font-mono">${new Date(time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
                        <td class="p-4 text-sm font-black text-blue-400 font-mono">${symbol}</td>
                        <td class="p-4 text-right font-bold font-mono ${pnlVal >= 0 ? 'text-green-400' : 'text-red-400'}">${isOpen ? '---' : pnlVal.toFixed(2)}</td>
                        <td class="p-4 text-right"><span class="px-2 py-1 rounded text-[9px] font-black uppercase ${isOpen ? 'bg-blue-500 text-white animate-pulse-slow' : 'bg-slate-800 text-slate-400'}">${status}</span></td>
                    `;
                    feedContainer.prepend(tr);
                });

                document.getElementById('trade-count').innerText = closedTrades;
                const wr = closedTrades > 0 ? Math.round((winCount / closedTrades) * 100) : 0;
                document.getElementById('win-rate').innerText = `${wr}%`;
                document.getElementById('win-rate-bar').style.width = `${wr}%`;
                document.getElementById('last-sync').innerText = `Synced: ${new Date().toLocaleTimeString()}`;

                renderChart(labels, points);
            } catch (err) { console.error(err); } finally { icon.classList.remove('animate-spin'); }
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{ data: data, borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59,130,246,0.1)', pointRadius: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: 'rgba(255,255,255,0.05)' } } } }
            });
        }

        function initTV() {
            new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "60", "theme": "dark", "style": "1", "container_id": "tv-chart", "hide_top_toolbar": true });
        }

        initDashboard(); initTV(); updateBTCPrice();
        setInterval(initDashboard, 60000); 
        setInterval(updateBTCPrice, 10000);
    </script>
</body>
</html>
